# Janitor Agent Configuration
# Copy this file to config.yaml and edit to match your setup.

# Maximum cost per run (USD) - safety limit
max_cost_per_run: 0.50

# Maximum open PRs across all repos
max_open_prs: 5

# Default aggressiveness (1-5)
default_aggressiveness: 2

# Default backend: "claude" or "ollama"
default_backend: claude

# Claude configuration (only used when backend is "claude")
# Requires ANTHROPIC_API_KEY environment variable
claude:
  model: claude-sonnet-4-6
  max_steps: 15

# Ollama configuration (only used when backend is "ollama")
# Requires Ollama running locally: https://ollama.com
ollama:
  host: http://localhost:11434
  model: qwen3-coder
  num_ctx: 16384
  max_steps: 15

# Planning agent configuration
planning:
  max_steps: 25
  workspace_dir: ~/.janitor/workspaces
  backlog_dir: ~/.janitor/backlog

# Repos to maintain
repos:
  - name: owner/repo-name
    aggressiveness: 2
    branch: main
    backend: claude
    # install_command: "npm install"       # optional: run before tests
    # test_command: "npm test"             # optional: validate changes

  # Example with Ollama backend
  # - name: owner/another-repo
  #   aggressiveness: 3
  #   branch: main
  #   backend: ollama
  #   test_command: "go test ./..."
