# Janitor Agent Configuration
# Copy to ~/.janitor/config.yaml
# Bootstrap-only — model names, enables, and tunable settings live in the DB
# and are editable via the Config UI.

# Database connection
database_url: postgresql://localhost:5432/janitor

# Web server port
port: 3003

# Ollama (optional — for local LLM; the model name is a runtime setting)
ollama:
  host: http://localhost:11434

# API keys are read from environment variables (never put them in this file):
#   ANTHROPIC_API_KEY — Claude
#   GEMINI_API_KEY    — Google Gemini (create at https://aistudio.google.com/apikey)

# Authentication: see .env.local (generate with: pnpm run auth:init <password>)
