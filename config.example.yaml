# Janitor Agent Configuration
# Copy to ~/.janitor/config.yaml

# Database connection
database_url: postgresql://localhost:5432/janitor

# Web server port
port: 3003

# Claude API (requires ANTHROPIC_API_KEY env var)
claude:
  model: claude-sonnet-4-6

# Ollama (optional — for local LLM)
ollama:
  host: http://localhost:11434
  model: qwen3-coder

# Authentication: see .env.local (generate with: pnpm run auth:init <password>)
